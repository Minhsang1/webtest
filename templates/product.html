<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background-color: #f4f6f9;">
    <nav class="navbar navbar-dark bg-dark py-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/dashboard"><i class="fas fa-arrow-left me-2"></i>Tiếp tục mua sắm</a>
            <div class="d-flex align-items-center">
                <span class="text-white fw-bold me-3"><i class="fas fa-user-circle me-1 text-warning"></i> {{ username }}</span>
                <a href="/dashboard?cart_open=1" class="btn btn-outline-light border-0"><i class="fas fa-shopping-cart text-warning"></i></a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        {% if product %}
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="row g-0">
                <div class="col-md-5 p-4 bg-white d-flex align-items-center justify-content-center">
                    <img src="{{ product['image_url'] }}" class="img-fluid rounded" style="max-height: 400px; object-fit: contain;">
                </div>
                <div class="col-md-7 p-5 bg-light">
                    <h2 class="fw-bold mb-3">{{ product['name'] }}</h2>
                    <h1 class="text-danger fw-bold display-5 mb-4">{{ product['price'] }}</h1>
                    <form action="/add_to_cart" method="POST">
                        <input type="hidden" name="product_id" value="{{ product['id'] }}">
                        <button type="submit" class="btn btn-warning btn-lg fw-bold px-5"><i class="fas fa-cart-plus me-2"></i>THÊM VÀO GIỎ HÀNG</button>
                    </form>
                </div>
            </div>
        </div>
        {% else %}
        <h3 class="text-center py-5">Sản phẩm không tồn tại.</h3>
        {% endif %}
    </div>
</body>
</html>
