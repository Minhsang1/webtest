<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ Sơ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card p-4 shadow-sm mx-auto" style="max-width: 500px;">
            <h3 class="fw-bold text-center">Hồ Sơ Của {{ user_info['full_name'] }}</h3>
            <hr>
            {% if msg %}<div class="alert alert-success">{{ msg }}</div>{% endif %}
            <form method="POST" action="/profile">
                <div class="mb-3"><label class="fw-bold">Tài khoản</label><input type="text" class="form-control" value="{{ user_info['username'] }}" disabled></div>
                <div class="mb-3"><label class="fw-bold">Họ Tên</label><input type="text" name="full_name" class="form-control" value="{{ user_info['full_name'] }}"></div>
                <div class="mb-3"><label class="fw-bold">Email</label><input type="email" name="email" class="form-control" value="{{ user_info['email'] }}"></div>
                <div class="mb-3"><label class="fw-bold">Mật khẩu mới</label><input type="password" name="password" class="form-control" value="{{ user_info['password'] }}"></div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2">CẬP NHẬT</button>
            </form>
            <a href="/dashboard" class="btn btn-link w-100 mt-3 text-dark text-decoration-none">Quay lại Shop</a>
        </div>
    </div>
</body>
</html>
