<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ví TechShop - Thanh Toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-header bg-dark text-white p-4 text-center">
                        <h4 class="mb-0 fw-bold text-warning"><i class="fas fa-wallet me-2"></i>VÍ ĐIỆN TỬ TECHSHOP</h4>
                    </div>
                    <div class="card-body p-4">
                        {% if msg %}<div class="alert alert-info py-2 small">{{ msg }}</div>{% endif %}
                        
                        <div class="text-center mb-4 p-4 bg-white border rounded-4 shadow-sm">
                            <p class="text-muted mb-1 fw-bold small">SỐ DƯ HIỆN TẠI</p>
                            <h1 class="display-5 fw-bold text-danger">{{ balance }}</h1>
                        </div>

                        {% if not bank_linked %}
                        <div class="p-3 bg-warning bg-opacity-10 border border-warning rounded-3 mb-4 text-center">
                            <p class="mb-2 small fw-bold text-dark">Bạn chưa liên kết ngân hàng!</p>
                            <form action="/link_bank" method="POST">
                                <div class="input-group">
                                    <input type="text" name="bank_number" class="form-control" placeholder="Nhập số tài khoản ngân hàng..." required>
                                    <button class="btn btn-dark fw-bold" type="submit">Liên kết ngay</button>
                                </div>
                            </form>
                        </div>
                        {% else %}
                        <div class="p-3 bg-success bg-opacity-10 border border-success rounded-3 mb-4">
                            <div class="d-flex align-items-center">
                                <i class="fas fa-university fa-2x text-success me-3"></i>
                                <div>
                                    <h6 class="mb-0 fw-bold">Ngân hàng đã liên kết</h6>
                                    <small class="text-muted">**** **** **** 8888</small>
                                </div>
                                <i class="fas fa-check-circle ms-auto text-success"></i>
                            </div>
                        </div>

                        <h6 class="fw-bold mb-3 small"><i class="fas fa-plus-circle me-1"></i>Nạp tiền vào ví</h6>
                        <form action="/deposit" method="POST" class="mb-4">
                            <div class="row g-2">
                                <div class="col-8">
                                    <select name="amount" class="form-select">
                                        <option value="500.000₫">500.000₫</option>
                                        <option value="1.000.000₫">1.000.000₫</option>
                                        <option value="5.000.000₫">5.000.000₫</option>
                                        <option value="10.000.000₫">10.000.000₫</option>
                                        <option value="20.000.000₫">20.000.000₫</option>
                                    </select>
                                </div>
                                <div class="col-4">
                                    <button type="submit" class="btn btn-danger w-100 fw-bold">Nạp Tiền</button>
                                </div>
                            </div>
                        </form>
                        {% endif %}

                        <div class="d-grid gap-2">
                            <a href="/qr_pay" class="btn btn-outline-dark fw-bold py-2"><i class="fas fa-qrcode me-2"></i>Quét mã QR Thanh toán</a>
                            <a href="/dashboard" class="btn btn-link text-decoration-none text-muted small">Quay lại mua sắm</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
