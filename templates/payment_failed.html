<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thanh Toán Thất Bại</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card border-0 shadow-lg p-5 text-center" style="max-width: 500px; border-radius: 20px;">
            <div class="mb-4">
                <i class="fas fa-times-circle text-danger" style="font-size: 80px;"></i>
            </div>
            <h2 class="fw-bold text-danger mb-3">Thanh Toán Thất Bại!</h2>
            <p class="text-muted fs-5">Rất tiếc, giao dịch của <strong>{{ username }}</strong> không thể hoàn tất.</p>
            
            <div class="alert alert-danger p-3 rounded-3 mb-4 text-start">
                <strong><i class="fas fa-exclamation-triangle me-2"></i>Lý do:</strong> {{ error }}
            </div>
            
            <p class="small text-muted mb-4">Vui lòng kiểm tra lại thông tin thẻ, số dư tài khoản hoặc API Key của cổng thanh toán và thử lại.</p>
            
            <div class="d-flex gap-3">
                <a href="/dashboard?cart_open=1" class="btn btn-outline-danger btn-lg w-50 fw-bold rounded-pill">THỬ LẠI</a>
                <a href="/dashboard" class="btn btn-dark btn-lg w-50 fw-bold rounded-pill">TRANG CHỦ</a>
            </div>
        </div>
    </div>
</body>
</html>
